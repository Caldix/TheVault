<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memories</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- shown when this browser has no data loaded yet -->
<div id="welcome" class="gate" style="display:none;">
  <div class="gate-card">
    <div class="gate-logo">memories</div>
    <p class="gate-sub">Load your posts file to get started on this device.</p>
    <label class="file-btn">
      Choose posts.json
      <input type="file" id="welcome-file" accept=".json" hidden>
    </label>
    <p id="welcome-error" class="gate-error"></p>
  </div>
</div>

<div id="app" class="app" style="display:none;">
  <header class="topbar">
    <div class="topbar-inner">
      <span class="logo">memories</span>
      <div class="topbar-controls">
        <select id="year-filter" class="year-filter">
          <option value="">All years</option>
        </select>
        <button id="menu-btn" class="menu-btn" title="Backup / load on another device">⋮</button>
      </div>
    </div>
    <div id="menu-panel" class="menu-panel" style="display:none;">
      <button id="export-btn">⬇ Download a backup of what's loaded here</button>
      <label class="menu-item-btn">
        ⬆ Load a posts file (replaces what's loaded here)
        <input type="file" id="reload-file" accept=".json" hidden>
      </label>
    </div>
  </header>

  <main class="feed">
    <section id="posts"></section>
    <button id="load-more" class="load-more" style="display:none;">See more</button>
    <p id="empty-msg" class="empty-msg" style="display:none;">No posts in this file.</p>
  </main>
</div>

<script src="app.js"></script>
</body>
</html>
