<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memories</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#145A32">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- shown once, the first time this browser opens the site -->
<div id="profile-setup" class="gate" style="display:none;">
  <div class="gate-card">
    <div class="gate-logo">memories</div>
    <p class="gate-sub">What's your name? It'll show on your posts.</p>
    <input type="text" id="profile-name-input" placeholder="Your name">
    <button id="profile-save-btn">Continue</button>
  </div>
</div>

<div id="app" class="app" style="display:none;">
  <header class="topbar">
    <div class="topbar-inner">
      <span class="logo">memories</span>
      <button id="menu-btn" class="menu-btn" title="Profile, backup, and more">⋮</button>
    </div>
    <div id="menu-panel" class="menu-panel" style="display:none;">
      <button id="change-name-btn">👤 Change name</button>
      <button id="export-btn">⬇ Download a backup of everything here</button>
      <label class="menu-item-btn">
        ⬆ Load a backup file (adds to what's already here)
        <input type="file" id="import-file" accept=".json" hidden>
      </label>
    </div>
  </header>

  <!-- vertical scrubber for jumping through years -->
  <aside id="timeline-rail" class="timeline-rail"></aside>

  <main class="feed">
    <!-- composer -->
    <section class="composer">
      <div class="composer-row-top">
        <div class="avatar" id="composer-avatar"></div>
        <span id="composer-name-display" class="composer-name"></span>
      </div>
      <textarea id="composer-text" placeholder="What's on your mind?"></textarea>
      <div id="photo-preview" class="photo-preview"></div>
      <p id="composer-hint" class="composer-hint" style="display:none;">Write something or add a photo first.</p>
      <div class="composer-row">
        <label class="file-btn">
          📷 Photo/Video
          <input type="file" id="composer-photos" accept="image/*,video/*" multiple hidden>
        </label>
        <label class="date-btn">
          🕐 <input type="datetime-local" id="composer-date">
        </label>
        <button id="composer-submit">Put it in the vault</button>
      </div>
    </section>

    <button id="vault-today-btn" class="vault-today-btn">📅 Open Vault</button>

    <div id="feed-heading" class="feed-heading" style="display:none;">
      <span id="feed-heading-text"></span>
      <button id="feed-heading-clear">✕</button>
    </div>

    <section id="posts"></section>
    <button id="load-more" class="load-more" style="display:none;">See more</button>
    <p id="empty-msg" class="empty-msg" style="display:none;">No posts yet — write your first one above.</p>
  </main>

  <button id="home-btn" class="home-btn" title="Back to top" style="display:none;">🏠</button>
</div>

<div id="lightbox-root"></div>

<script src="app.js"></script>
</body>
</html>
