<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memories</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <span class="logo">memories</span>
    <div class="topbar-controls">
      <select id="year-filter" class="year-filter">
        <option value="">All years</option>
      </select>
      <button id="menu-btn" class="menu-btn" title="Backup / move to another device">⋮</button>
    </div>
  </div>
  <div id="menu-panel" class="menu-panel" style="display:none;">
    <button id="export-btn">⬇ Download a backup of everything here</button>
    <label class="menu-item-btn">
      ⬆ Load a backup file (adds to what's already here)
      <input type="file" id="import-file" accept=".json" hidden>
    </label>
  </div>
</header>

<main class="feed">
  <!-- composer -->
  <section class="composer">
    <div class="composer-row-top">
      <input type="text" id="composer-author" class="author-input" placeholder="Your name">
    </div>
    <textarea id="composer-text" placeholder="What's on your mind?"></textarea>
    <div id="photo-preview" class="photo-preview"></div>
    <div class="composer-row">
      <label class="file-btn">
        📷 Photo
        <input type="file" id="composer-photos" accept="image/*" multiple hidden>
      </label>
      <label class="date-btn">
        🕐 <input type="datetime-local" id="composer-date">
      </label>
      <button id="composer-submit">Post</button>
    </div>
  </section>

  <section id="posts"></section>
  <button id="load-more" class="load-more" style="display:none;">See more</button>
  <p id="empty-msg" class="empty-msg" style="display:none;">No posts yet — write your first one above.</p>
</main>

<div id="lightbox-root"></div>

<script src="app.js"></script>
</body>
</html>
